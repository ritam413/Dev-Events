# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
tone_instructions: "Be concise and actionable. Focus on bugs, security, and performance over style."
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false

path_filters:
  - "!node_modules/**"
  - "!.next/**"
  - "!public/**"
  - "!*.lock"
  - "!package-lock.json"

chat:
  auto_reply: true
